[[permission]]
identifier = "desktop-bridge"
description = "Allows the RobotCloud web frontend to use the controlled SO101 and terminal desktop bridge."
commands.allow = [
  "runtime_prepare",
  "desktop_status",
  "desktop_get_auth_session",
  "desktop_set_auth_session",
  "desktop_clear_auth_session",
  "dataset_inspect_upload",
  "dataset_prepare_upload",
  "dataset_get_prepared_upload",
  "dataset_set_prepared_upload",
  "dataset_clear_prepared_upload",
  "dataset_read_prepared_upload",
  "so101_run",
  "so101_stop",
  "so101_validate_port",
  "so101_validate_camera",
  "so101_preview_camera",
  "terminal_start",
  "terminal_write",
  "terminal_resize",
  "terminal_stop",
]
