# RoboCloud AMD 隧道用户 sshd 限制块
# 安装到 /etc/ssh/sshd_config.d/60-rc-tunnel.conf （由 setup_amd.sh 处理占位符）
#
# 作用：把 __TUNNEL_USER__ 这个账号彻底阉割成"只能做端口转发到指定端口"，
# 即使密钥/证书泄露，也拿不到 shell、碰不到别的服务与数据。
#
# 注意：Match 块必须放在 sshd_config 主配置的末尾语义区；本文件由 sshd_config.d 引入，
# 其内的指令仅在 Match 命中时生效，命中后直到文件结束或下一个 Match。

Match User __TUNNEL_USER__
    # 永远给不了交互 shell（即使不带 -N 连进来，也只会 sleep）
    ForceCommand /usr/bin/sleep infinity
    PermitTTY no
    # 只允许本地转发 -L，禁止 -R / 动态代理 / X11 / agent 转发
    AllowTcpForwarding local
    X11Forwarding no
    AllowAgentForwarding no
    GatewayPorts no
    # 只能转发到这两个端口：Agent HTTP(__AGENT_PORT__) 与 推理(__INFERENCE_PORT__)
    # 如需并发推理，把整段端口都列出来，或改用范围（新版本 OpenSSH 不支持范围，需逐个列）
    PermitOpen 127.0.0.1:__AGENT_PORT__ 127.0.0.1:__INFERENCE_PORT__
    # 该账号只认密钥/证书，禁密码
    PasswordAuthentication no
    PubkeyAuthentication yes
