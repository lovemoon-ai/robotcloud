# RoboCloud 数据面子路由 —— 把此 location 并入 RoboCloud 站点的 server{} 块（HTTPS 那个）
#
# 浏览器上传数据集：https://<RoboCloud域名>/amd-agent/... 打到这里，nginx 剥掉 /amd-agent/ 前缀，
# 经 127.0.0.1:6152（volc 上的 autossh 隧道）转到 AMD 的 GPU Agent。
#
# 关键点：
#   1) proxy_pass 结尾必须带 "/"，用于剥掉 /amd-agent/ 前缀
#      （Agent 内部精确匹配 /api/v1/agent/...，带前缀会 404）。
#   2) 大文件分块续传：关闭 body 缓冲、放开体积、拉长超时。
#   3) 同源，无需 CORS / 无 mixed-content。

location /amd-agent/ {
    proxy_pass http://127.0.0.1:6152/;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 大文件分块上传
    client_max_body_size 0;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}
